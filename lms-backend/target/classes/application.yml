server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

spring:
  profiles:
    active: dev
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
        transport:
          protocol: smtp

app:
  jwt:
    secret: ${JWT_SECRET:MySecretKeyForLMSSystemThatIsAtLeast32CharactersLongAndSecure}
    expiration: 86400000
    refresh-expiration: 604800000
  fine:
    rate-per-day: 2.00
    max-fine: 500.00
  borrowing:
    default:
      max-books: 5
      loan-days: 14
      renewals: 2
    admin:
      max-books: 10
      loan-days: 30
      renewals: 3
    librarian:
      max-books: 10
      loan-days: 30
      renewals: 3
    student:
      max-books: 5
      loan-days: 14
      renewals: 2
    member:
      max-books: 4
      loan-days: 21
      renewals: 1
  reservation:
    expiry-days: 3
  notification:
    due-reminder-days: 2

logging:
  level:
    com.lms: DEBUG
    org.springframework.security: WARN
