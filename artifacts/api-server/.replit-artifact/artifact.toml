kind = "api"
previewPath = "/api"
title = "LMS Java Backend"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "java -jar /home/runner/workspace/lms-backend/target/library-management-system-1.0.0.jar"

[services.development.env]
PORT = "8080"
SPRING_PROFILES_ACTIVE = "default"

[services.production]

[services.production.build]
args = ["sh", "-c", "cd /home/runner/workspace/lms-backend && mvn package -DskipTests -q"]

[services.production.run]
args = ["java", "-jar", "/home/runner/workspace/lms-backend/target/library-management-system-1.0.0.jar"]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/api/healthz"
